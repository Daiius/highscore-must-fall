name: Build and push server image to GHCR

# macOS の開発マシンから、本番（linux/amd64）向け server イメージを CI でビルドして
# GHCR へ push する。手動起動（workflow_dispatch）。参考: seseraki / girls-side-analysis。
# web は Docker 化せず、Vite ビルド出力を本番 nginx へ配置する運用のため対象外。

on:
  workflow_dispatch:
  # staging 導入時に自動ビルドを有効化する候補（当面は手動）:
  # push:
  #   branches: [main]
  #   paths: [packages/server/**, packages/shared/**, packages/database/**, pnpm-lock.yaml]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 最終的なイメージ名は ghcr.io/daiius/highscore-must-fall-server（小文字化される）。
          images: ghcr.io/${{ github.repository }}-server
          # 付与するタグ:
          #   - ブランチ名（/ は - に置換）例: :main
          #   - sha-<40桁フル SHA>            固定参照用
          #   - :latest                       デフォルトブランチ実行時のみ
          tags: |
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile.prod
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
