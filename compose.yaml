# 開発環境（Q: docker compose watch / bind mount 最小）。
# `pnpm dev` = `docker compose watch`。実体の同期は bind mount ではなく watch の sync で行う。
services:
  db:
    image: mysql:8.4
    environment:
      TZ: "Asia/Tokyo"
    env_file:
      - .env.database
    volumes:
      - db-data:/var/lib/mysql
    # ホストへのポート公開はしない（server からは docker network 越しに触れる）。
    # 他プロジェクトと並行開発する際のホスト 3306 衝突を避けるため。
    # ホストから直接触りたいときは compose.override.yaml で ports を足す。
    cap_add:
      - SYS_NICE
    healthcheck:
      test: mysql -u $$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e "select 1;"
      interval: 5s
      timeout: 20s
      retries: 3
      start_period: 5s

  # 開発用の S3 互換ストレージ（BlobStore の s3 アダプタ検証用。本番は Cloudflare R2）。prd/02 §7。
  # server からは http://seaweedfs:8333 で到達する（ホストへのポート公開はしない）。
  seaweedfs:
    image: chrislusf/seaweedfs:4.37
    command: server -dir=/data -s3 -s3.port=8333
    volumes:
      - seaweed-data:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    env_file:
      - .env.database
      - .env.server
    environment:
      # NODE_ENV / WEB_ORIGIN は .env.server（env_file）から注入する。
      # compose の environment は env_file より優先されるため、ここに書くと .env.server で上書きできない。
      TZ: "Asia/Tokyo"
    command: pnpm --filter server dev
    depends_on:
      db:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    ports:
      - "4000:4000"
    volumes:
      - blob-data:/workspace/packages/server/.blob # MVP の BlobStore ローカル実装の保存先
    develop:
      watch:
        - action: sync+restart
          path: ./packages/server
          target: /workspace/packages/server
          ignore: [node_modules/, dist/, "*.tsbuildinfo", "*.log"]
        - action: sync+restart
          path: ./packages/shared
          target: /workspace/packages/shared
          ignore: [node_modules/, dist/]
        - action: sync+restart
          path: ./packages/database
          target: /workspace/packages/database
          ignore: [node_modules/, dist/]
        - action: rebuild
          path: pnpm-lock.yaml

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    env_file:
      - .env.web
    environment:
      TZ: "Asia/Tokyo"
    command: pnpm --filter web dev --host
    depends_on:
      - server
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: ./packages/web
          target: /workspace/packages/web
          ignore: [node_modules/, dist/, "*.tsbuildinfo", "*.log"]
        - action: sync
          path: ./packages/shared
          target: /workspace/packages/shared
          ignore: [node_modules/, dist/]
        - action: rebuild
          path: pnpm-lock.yaml

# 注: worker（スクショ自動解析）は compose に含めない。server とは分離した実行環境で
# `pnpm --filter worker daemon` として動かす（prd/04 §9.2。具体構成は非公開の運用メモ）。

volumes:
  db-data:
  blob-data: # BlobStore local 実装のフォールバック用（開発既定は seaweedfs）
  seaweed-data:
